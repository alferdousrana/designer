name: Django CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.13"

    - name: Install dependencies
      run: |
        cd server
        pip install -r requirements.txt

    - name: Run migrations
      run: |
        cd server
        python manage.py migrate

    - name: Run tests
      run: |
        cd server
        python manage.py test